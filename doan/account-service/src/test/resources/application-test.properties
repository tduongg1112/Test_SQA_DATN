spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Ignore other heavy dependencies for test speed
spring.kafka.bootstrap-servers=localhost:9092
spring.data.redis.host=localhost
# Missing beans for context
https.config=false
jwt.secret=mySecretKeyForJwtTokenThatShouldBeAtLeast256BitsLongToEnsureSecurityAndProperFunctioning
jwt.expiration=86400000
oauth2.redirect-uri=http://localhost:5173

accountservice.api-gateway-url=http://localhost:8080
accountservice.account-service-url=http://localhost:8082

# OAuth2
spring.security.oauth2.client.registration.google.client-id=mock-client-id
spring.security.oauth2.client.registration.google.client-secret=mock-secret
spring.security.oauth2.client.registration.google.scope=profile,email
