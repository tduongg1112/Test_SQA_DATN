spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://${EUREKA_SERVER_HOST:localhost}:8761/eureka
eureka.client.registry-fetch-interval-seconds=5

# DISABLE Discovery Locator
spring.cloud.gateway.discovery.locator.enabled=false

# Manual routes
# OAuth2 routes - PHẢI ĐẶT TRƯỚC các route khác
spring.cloud.gateway.routes[0].id=account-oauth2
spring.cloud.gateway.routes[0].uri=lb://account-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/oauth2/**, /login/oauth2/**

spring.cloud.gateway.routes[1].id=diagram-websocket
spring.cloud.gateway.routes[1].uri=lb:ws://react-flow-be
spring.cloud.gateway.routes[1].predicates[0]=Path=/ws/**

spring.cloud.gateway.routes[2].id=account
spring.cloud.gateway.routes[2].uri=lb://account-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/account/**

spring.cloud.gateway.routes[3].id=diagram
spring.cloud.gateway.routes[3].uri=lb://react-flow-be
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/**

spring.cloud.gateway.routes[4].id=gateway-api
spring.cloud.gateway.routes[4].uri=http://localhost:8080
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/**

# CORS

# SpringDoc config 
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# API docs routes (thông qua Gateway để tránh CORS)
spring.cloud.gateway.routes[5].id=account-docs
spring.cloud.gateway.routes[5].uri=lb://account-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/account-service/v3/api-docs
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[6].id=chatbot-service
spring.cloud.gateway.routes[6].uri=http://${CHAT_SERVICE_HOST:localhost}:8000
spring.cloud.gateway.routes[6].predicates[0]=Path=/**

# URLs qua Gateway (cùng origin - không có CORS issue)
springdoc.swagger-ui.urls[0].name=API Gateway
springdoc.swagger-ui.urls[0].url=/v3/api-docs

springdoc.swagger-ui.urls[1].name=Account Service  
springdoc.swagger-ui.urls[1].url=/account-service/v3/api-docs

# Logging configuration
logging.level.org.springframework.cloud.gateway=DEBUG

# Console output với ANSI colors
spring.output.ansi.enabled=ALWAYS

#Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}