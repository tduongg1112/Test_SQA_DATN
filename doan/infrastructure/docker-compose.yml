services:
  eureka-server:
    image: nghhie/eureka-server:latest
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_HOSTNAME=eureka-server
    networks:
      - diagram-network

  redis:
    image: redis:7-alpine
    container_name: redis-shared
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - diagram-network

  api-gateway:
    build: ../api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - EUREKA_SERVER_HOST=eureka-server
      - SPRING_DATA_REDIS_HOST=redis-shared
      - SPRING_DATA_REDIS_PORT=6379
      - CHAT_SERVICE_HOST=chat-service
    depends_on:
      - eureka-server
      - redis
    networks:
      - diagram-network

  account-service:
    build: ../account-service
    container_name: account-service
    ports:
      - "8082:8082"
    environment:
      - JAVA_OPTS=-Xmx384m -Xms128m -Duser.timezone=Asia/Ho_Chi_Minh
      - TZ=Asia/Ho_Chi_Minh
      - SPRING_PROFILES_ACTIVE=dev
      - EUREKA_SERVER_HOST=eureka-server
      - SPRING_DATA_REDIS_HOST=redis-shared
      - SPRING_DATA_REDIS_PORT=6379
      - CHAT_SERVICE_HOST=chat-service
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-diagram:3306/schema_account?createDatabaseIfNotExist=true&serverTimezone=Asia/Ho_Chi_Minh
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1111
      - GOOGLE_CLIENT_ID=YOUR_GOOGLE_CLIENT_ID_HERE
      - GOOGLE_CLIENT_SECRET=YOUR_GOOGLE_CLIENT_SECRET_HERE
    depends_on:
      eureka-server:
        condition: service_started
      mysql-diagram:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - diagram-network

  react-flow-be:
    build: ../react-flow-be
    container_name: react-flow-be
    ports:
      - "8085:8085"
    environment:
      - JAVA_OPTS=-Xmx384m -Xms128m -Duser.timezone=Asia/Ho_Chi_Minh
      - TZ=Asia/Ho_Chi_Minh
      - EUREKA_SERVER_HOST=eureka-server
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-diagram:3306/schema_visualizer?createDatabaseIfNotExist=true&serverTimezone=Asia/Ho_Chi_Minh
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1111
    depends_on:
      eureka-server:
        condition: service_started
      mysql-diagram:
        condition: service_healthy
    networks:
      - diagram-network

  mysql-diagram:
    image: mysql:8
    container_name: mysql-diagram
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1111
      MYSQL_DATABASE: schema_visualizer
    volumes:
      - mysql_diagram_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1111"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - diagram-network

  chat-service:
    build: ../chat-service
    container_name: chat-service
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=mysql-diagram
      - DB_PORT=3306
      - DB_PASSWORD=1111
    depends_on:
      - mysql-diagram
    networks:
      - diagram-network

  react-flow:
    build: ../react-flow
    container_name: react-flow
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
      - react-flow-be
    networks:
      - diagram-network

volumes:
  redis_data:
  mysql_diagram_data:
  postgres_account_data:

networks:
  diagram-network:
    driver: bridge
    name: diagram-network
